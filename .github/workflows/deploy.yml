name: CI + deploy to VPS

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -q
        # KB-dependent tests skip automatically when the vault isn't mounted
      - run: uv run ruff check src tests

  deploy:
    # push to master only — PRs stop at tests
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Deploy over SSH
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::warning::VPS_SSH_KEY secret is not set — skipping deploy"
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H pr0sto.net >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes admin@pr0sto.net '
            set -euo pipefail
            cd /srv/robin/robin-runtime
            sudo -u robin git pull --ff-only
            sudo -u robin uv sync
            sudo systemctl restart robin-telegram robin-web
            sleep 3
            systemctl is-active robin-telegram robin-web
            curl -fsS http://127.0.0.1:8080/healthz && echo " deploy OK"
          '
